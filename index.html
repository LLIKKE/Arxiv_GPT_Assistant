<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArXiv GPT Assistant - Daily Papers</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 {
            font-size: 1.8rem;
            color: #111827;
            margin-bottom: 10px;
        }
        p.date {
            color: #6b7280;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        a.button {
            display: inline-block;
            padding: 12px 24px;
            background-color: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background-color 0.3s;
        }
        a.button:hover {
            background-color: #2563eb;
        }
        a.button.zh {
            background-color: #10b981;
        }
        a.button.zh:hover {
            background-color: #059669;
        }
        footer {
            margin-top: 40px;
            color: #9ca3af;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 ArXiv GPT Assistant</h1>
        <p class="date">Updated: <strong>2026-06-25 06:07:37</strong></p>
        <p style="margin-bottom: 25px; color: #4b5563;">Select your preferred language to read today's AI papers summary.</p>
        <div class="links">
            <a href="./en" class="button">🇺🇸 Read in English</a>
            <a href="./zh" class="button zh">🇨🇳 中文版本 (Chinese)</a>
        </div>
    </div>
    <footer>
        <small>&copy; 2025 ArXiv GPT Assistant. Auto-generated by GitHub Actions.</small>
    </footer>
</body>
</html>
