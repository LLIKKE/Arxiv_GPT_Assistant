name: Publish output MD to GitHub Pages

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Run daily arxiv"] # 这个工作流会在Run daily arxiv完成后被触发，Run daily arxiv又是每天定时触发，从而让这个定时触发
    types:
      - completed

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 检出代码
      - uses: actions/checkout@v4

      # 下载生成的 Artifact
      - name: Download artifact
        id: download-artifact
        uses: dawidd6/action-download-artifact@v4
        with:
          workflow: cron_runs.yaml
          workflow_conclusion: success
          name: arxiv-scanner-outputs


      # 检查 output.md 和 output_translated.md 是否存在
      - name: Check for output files
        id: check_files
        uses: andstor/file-existence-action@v2
        with:
          files: output.md,output_translated.md

      # 确保输出目录和语言子目录存在
      - name: Ensure dist directories exist
        run: |
          mkdir -p dist/en
          mkdir -p dist/zh

      # 转换英文版本的 output.md 为网页
      - name: Convert English version to pages
        uses: wranders/markdown-to-pages-action@v0.1
        if: steps.check_files.outputs.files_exists == 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          file: output.md
          out-path: dist/en
          out-path-not-empty: true

      # 转换中文版本的 output_translated.md 为网页
      - name: Convert Chinese version to pages
        uses: wranders/markdown-to-pages-action@v0.1
        if: steps.check_files.outputs.files_exists == 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          file: output_translated.md
          out-path: dist/zh
          out-path-not-empty: true

      - name: Generate navigation index
        run: |
          current_date=$(TZ="Asia/Shanghai" date "+%Y-%m-%d %H:%M:%S")
          
          cat << 'EOF' > dist/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta http-equiv="X-UA-Compatible" content="IE=edge">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>ArXiv GPT Assistant - Daily Papers</title>
              <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
              <style>
                  body {
                      font-family: 'Inter', sans-serif;
                      background-color: #f3f4f6;
                      color: #1f2937;
                      display: flex;
                      flex-direction: column;
                      align-items: center;
                      justify-content: center;
                      min-height: 100vh;
                      margin: 0;
                  }
                  .container {
                      background: white;
                      padding: 40px;
                      border-radius: 12px;
                      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
                      text-align: center;
                      max-width: 500px;
                      width: 90%;
                  }
                  h1 {
                      font-size: 1.8rem;
                      color: #111827;
                      margin-bottom: 10px;
                  }
                  p.date {
                      color: #6b7280;
                      font-size: 0.9rem;
                      margin-bottom: 30px;
                  }
                  .links {
                      display: flex;
                      flex-direction: column;
                      gap: 15px;
                  }
                  a.button {
                      display: inline-block;
                      padding: 12px 24px;
                      background-color: #3b82f6;
                      color: white;
                      text-decoration: none;
                      border-radius: 8px;
                      font-weight: 600;
                      transition: background-color 0.3s;
                  }
                  a.button:hover {
                      background-color: #2563eb;
                  }
                  a.button.zh {
                      background-color: #10b981;
                  }
                  a.button.zh:hover {
                      background-color: #059669;
                  }
                  footer {
                      margin-top: 40px;
                      color: #9ca3af;
                      font-size: 0.8rem;
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>📚 ArXiv GPT Assistant</h1>
                  <p class="date">Updated: <strong>EOF
          echo "$current_date" >> dist/index.html
          cat << 'EOF' >> dist/index.html
                  </strong></p>
                  <p style="margin-bottom: 25px; color: #4b5563;">Select your preferred language to read today's AI papers summary.</p>
                  <div class="links">
                      <a href="./en" class="button">🇺🇸 Read in English</a>
                      <a href="./zh" class="button zh">🇨🇳 中文版本 (Chinese)</a>
                  </div>
              </div>
              <footer>
                  <small>&copy; 2025 ArXiv GPT Assistant. Auto-generated by GitHub Actions.</small>
              </footer>
          </body>
          </html>
          EOF

      - name: Debug deployment condition
        run: |
          echo "Deployment condition: ${{ steps.check_files.outputs.files_exists }}"

      # 上传静态网页文件作为 GitHub Pages 的 artifact
      - name: Upload Pages artifact
        uses: actions/upload-artifact@v4
        if: steps.check_files.outputs.files_exists == 'true'
        with:
          path: dist

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist # The folder the action should deploy.

      - name: Set environment variables
        run: |
          echo "FROM_ADDR=${{ secrets.FROM_ADDR }}" >> $GITHUB_ENV
          echo "TO_ADDR=${{ secrets.TO_ADDR }}" >> $GITHUB_ENV
          echo "PASSWORD=${{ secrets.PASSWORD }}" >> $GITHUB_ENV

      # Step 5: Sent email
      - name: sent .html to email
        run: |
          python src/notify/email.py